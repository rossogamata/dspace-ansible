---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base system packages
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - git
      - tar
      - unzip
      - ca-certificates
      - gnupg
      - lsb-release
      - ant
      - maven
      - openjdk-17-jdk
      - python3-psycopg2    # required by community.postgresql modules
    state: present

- name: Set JAVA_HOME system-wide
  ansible.builtin.copy:
    dest: /etc/profile.d/java.sh
    content: |
      export JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))
      export PATH=$JAVA_HOME/bin:$PATH
    mode: "0644"

- name: Create dspace system user and group
  ansible.builtin.user:
    name: dspace
    system: true
    shell: /bin/bash
    home: /home/dspace
    create_home: true
    state: present

- name: Create build directory
  ansible.builtin.file:
    path: "{{ dspace_build_dir }}"
    state: directory
    owner: dspace
    group: dspace
    mode: "0755"

# ── Node.js 22.x via NodeSource ──────────────────────────────────────────────

- name: Check if NodeSource repo is already configured
  ansible.builtin.stat:
    path: /etc/apt/sources.list.d/nodesource.list
  register: nodesource_list

- name: Download NodeSource setup script
  ansible.builtin.get_url:
    url: "https://deb.nodesource.com/setup_{{ nodejs_major_version }}.x"
    dest: /tmp/nodesource_setup.sh
    mode: "0755"
  when: not nodesource_list.stat.exists

- name: Run NodeSource setup script
  ansible.builtin.command: bash /tmp/nodesource_setup.sh
  when: not nodesource_list.stat.exists
  changed_when: true

- name: Install Node.js
  ansible.builtin.apt:
    name: nodejs
    state: present
    update_cache: true

- name: Install PM2 globally
  community.general.npm:
    name: pm2
    global: true
    state: present
