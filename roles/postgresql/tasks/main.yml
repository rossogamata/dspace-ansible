---
- name: Install prerequisite packages for PGDG repo
  ansible.builtin.apt:
    name:
      - gnupg
      - curl
    state: present
    update_cache: true

- name: Add PostgreSQL apt signing key
  ansible.builtin.apt_key:
    url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
    state: present

- name: Add PostgreSQL apt repository
  ansible.builtin.apt_repository:
    repo: "deb https://apt.postgresql.org/pub/repos/apt {{ ansible_distribution_release }}-pgdg main"
    state: present
    filename: pgdg
    update_cache: true

- name: Install PostgreSQL {{ postgresql_version }} and contrib
  ansible.builtin.apt:
    name:
      - "postgresql-{{ postgresql_version }}"
    state: present

- name: Ensure PostgreSQL is started and enabled
  ansible.builtin.systemd:
    name: postgresql
    state: started
    enabled: true

- name: Set listen_addresses = 'localhost' in postgresql.conf
  ansible.builtin.lineinfile:
    path: "{{ postgresql_conf_dir }}/postgresql.conf"
    regexp: '^#?listen_addresses\s*='
    line: "listen_addresses = 'localhost'"
    backup: true
  notify: Restart postgresql

- name: Add DSpace pg_hba.conf entry
  ansible.builtin.blockinfile:
    path: "{{ postgresql_conf_dir }}/pg_hba.conf"
    marker: "# {mark} ANSIBLE MANAGED — DSpace"
    insertbefore: "^# IPv4 local connections:"
    block: |
      host    {{ db_name }}    {{ db_username }}    127.0.0.1/32    md5
    backup: true
  notify: Reload postgresql

- name: Flush handlers (apply pg_hba before creating objects)
  ansible.builtin.meta: flush_handlers

- name: Create DSpace database user
  community.postgresql.postgresql_user:
    name: "{{ db_username }}"
    password: "{{ db_password }}"
    role_attr_flags: NOSUPERUSER,NOCREATEROLE,NOCREATEDB
    state: present
  become_user: postgres

- name: Create DSpace database
  community.postgresql.postgresql_db:
    name: "{{ db_name }}"
    owner: "{{ db_username }}"
    encoding: UTF-8
    state: present
  become_user: postgres

- name: Install pgcrypto extension in DSpace database
  community.postgresql.postgresql_ext:
    name: pgcrypto
    db: "{{ db_name }}"
    state: present
  become_user: postgres
